services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - prometheus-net

  ollama-exporter:
    image: lucabecker42/ollama-exporter:latest
    container_name: ollama-exporter
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      - ollama
    networks:
      - prometheus-net

networks:
  prometheus-net:
    external: true
    name: docker-prometheus_prometheus-net   # ← 实际网络名