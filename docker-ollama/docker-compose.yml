services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"                  # Ollama API 端口
    volumes:
      - ./ollama-data:/root/.ollama

    # ✅ GPU 正确写法（通用）
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

    networks:
      - ai-network

networks:
  ai-network:
    external: true