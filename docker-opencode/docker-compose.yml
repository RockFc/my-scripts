services:
  opencode:
    image: ghcr.io/anomalyco/opencode
    container_name: opencode-agent
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      - TZ=Asia/Shanghai
      # 🚀 此时由于 docker-ollama 已经加入了 docker-ollama_ai-network，这行配置将彻底打通！
      - OPENAI_API_BASE=http://docker-ollama:11434/v1
      - OPENAI_API_KEY=ollama
    volumes:
      # Linux 宿主机：直接挂载
      - ~/workspace:/workspace
      # Windows 宿主机：注释上面，取消注释下面
      # - D:\Coding:/workspace
    working_dir: /workspace/code/rock_codex
    networks:
      - dev-net

networks:
  dev-net:
    external: true